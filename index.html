<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="keywords" content=""> -->
    <meta name="description" content="Небольшое веб-приложение для заказа вкусной пиццы онлайн">
    <meta name="author" content="Super Pizza">
    <meta name="copyright" content="Super Pizza Store">
    <meta name="address" content="г. Москва, ул. Вкусная, 10">
    <meta property="og:site_name" content="Super Pizza">
    <meta property="og:title" content="Super Pizza — лучшая пицца в городе">
    <meta property="og:image" content="img/logo.png">
    <meta property="og:url" content="#">
    <title>Super Pizza — лучшая пицца в городе</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="_wrapper">
        <header class="global">
            <div class="_container">
                <div class="header-global_inner">
                    <h2 class="logotype">
                        <a href="index.html">Super Pizza</a>
                    </h2>
                </div>
            </div>
        </header>
        <main>
            <section class="front-page">
                <div class="_container">
                    <div class="front-page_inner">
                        <article>
                            <h1>Super Pizza</h1>
                            <p>Свежая, горячая и невероятно вкусная пицца с доставкой</p>
                            <div class="img_container">
                                <img src="img/logo.png">
                            </div>
                        </article>
                    </div>
                </div>
            </section>
            <section class="bestsellers">
                <div class="_container">
                    <div class="bestsellers_inner">
                        <h2>Популярные пиццы</h2>
                        <div class="items_container">
                            <article name="margherita">
                                <div class="item_view img_container">
                                    <img src="img/margherita.jpg">
                                </div>
                                <div class="item_info">
                                    <h3>Маргарита</h3>
                                    <p>Томатный соус, моцарелла, свежий базилик</p>
                                </div>
                                <div class="button_block">
                                    <button name="buy_item">Заказать</button>
                                </div>
                            </article>
                            <article name="pepperoni">
                                <div class="item_view img_container">
                                    <img src="img/pepperoni.jpg">
                                </div>
                                <div class="item_info">
                                    <h3>Пепперони</h3>
                                    <p>Томатный соус, моцарелла, острая пепперони</p>
                                </div>
                                <div class="button_block">
                                    <button name="buy_item">Заказать</button>
                                </div>
                            </article>
                            <article name="four_cheese">
                                <div class="item_view img_container">
                                    <img src="img/four_cheese.jpg">
                                </div>
                                <div class="item_info">
                                    <h3>Четыре сыра</h3>
                                    <p>Моцарелла, дорблю, пармезан и чеддер</p>
                                </div>
                                <div class="button_block">
                                    <button name="buy_item">Заказать</button>
                                </div>
                            </article>
                        </div>
                    </div>
                </div>
            </section>
            <section class="reg_form">
                <div class="_container">
                    <div class="reg_form_inner">
                        <h2><label for="userFullName">Заказ пиццы</label></h2>
                        <article>
                            <form action="#" method="post">
                                <div class="form-places">
                                    <div class="user-name_place">
                                        <label>
                                            <span class="label_place">ФИО</span>
                                            <input type="text" name="user_full_name" id="userFullName">
                                        </label>
                                    </div>
                                    <div class="user-email_place">
                                        <label>
                                            <span class="label_place">Почта</span>
                                            <input type="text" name="user_email" id="userEmail">
                                        </label>
                                    </div>
                                    <div class="user-tel_place">
                                        <label>
                                            <span class="label_place">Телефон</span>
                                            <input type="text" name="user_tel" id="userTel">
                                        </label>
                                    </div>
                                </div>
                                <div class="form-buttons">
                                    <input type="button" name="send_reg" value="Оформить заказ">
                                    <input type="reset" name="clear_reg" value="Очистить">
                                </div>
                            </form>
                        </article>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
