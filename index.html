<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вкуснейшая пицца с доставкой по городу. Свежие ингредиенты и горячая подача!">
    <meta name="author" content="Pizza House">
    <meta property="og:site_name" content="Pizza House">
    <meta property="og:title" content="Pizza House — настоящая итальянская пицца">
    <meta property="og:image" content="img/logo.png">
    <meta property="og:url" content="#">
    <title>Pizza House — настоящая итальянская пицца</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="_wrapper">
        <header class="global">
            <div class="_container">
                <div class="header-global_inner">
                    <h2 class="logotype">
                        <a href="index.html">🍕 Pizza House</a>
                    </h2>
                </div>
            </div>
        </header>

        <main>
            <!-- Главная секция -->
            <section class="front-page">
                <div class="_container">
                    <div class="front-page_inner">
                        <article>
                            <h1>Горячая пицца с доставкой</h1>
                            <p>Свежая, ароматная и приготовленная по традиционным рецептам Италии</p>
                            <div class="img_container">
                                <img src="img/logo.png" alt="Логотип пиццерии">
                            </div>
                        </article>
                    </div>
                </div>
            </section>

            <!-- Хиты продаж -->
            <section class="bestsellers">
                <div class="_container">
                    <div class="bestsellers_inner">
                        <h2>🔥 Хиты продаж</h2>
                        <div class="items_container">

                            <article name="margherita">
                                <div class="item_view img_container">
                                    <img src="img/margherita.jpg" alt="Пицца Маргарита">
                                </div>
                                <div class="item_info">
                                    <h3>Маргарита</h3>
                                    <p>Томатный соус, моцарелла, свежий базилик</p>
                                </div>
                                <div class="button_block">
                                    <button name="buy_item">Заказать</button>
                                </div>
                            </article>

                            <article name="pepperoni">
                                <div class="item_view img_container">
                                    <img src="img/pepperoni.jpg" alt="Пицца Пепперони">
                                </div>
                                <div class="item_info">
                                    <h3>Пепперони</h3>
                                    <p>Томатный соус, моцарелла, пикантная колбаса пепперони</p>
                                </div>
                                <div class="button_block">
                                    <button name="buy_item">Заказать</button>
                                </div>
                            </article>

                            <article name="four_cheese">
                                <div class="item_view img_container">
                                    <img src="img/four_cheese.jpg" alt="Пицца Четыре сыра">
                                </div>
                                <div class="item_info">
                                    <h3>Четыре сыра</h3>
                                    <p>Моцарелла, дорблю, пармезан, чеддер</p>
                                </div>
                                <div class="button_block">
                                    <button name="buy_item">Заказать</button>
                                </div>
                            </article>

                        </div>
                    </div>
                </div>
            </section>

            <!-- Форма подписки -->
            <section class="reg_form">
                <div class="_container">
                    <div class="reg_form_inner">
                        <h2><label for="userFullName">🎁 Получить скидку 10%</label></h2>
                        <article>
                            <form action="#" method="post">
                                <div class="form-places">
                                    
                                    <div class="user-name_place">
                                        <label>
                                            <span class="label_place">Ваше имя</span>
                                            <input type="text" name="user_name" id="userFullName">
                                        </label>
                                    </div>

                                    <div class="user-email_place">
                                        <label>
                                            <span class="label_place">Email</span>
                                            <input type="email" name="user_email" id="userEmail">
                                        </label>
                                    </div>

                                    <div class="user-tel_place">
                                        <label>
                                            <span class="label_place">Телефон</span>
                                            <input type="tel" name="user_tel" id="userTel">
                                        </label>
                                    </div>

                                </div>

                                <div class="form-buttons">
                                    <input type="submit" name="send_reg" value="Получить скидку">
                                    <input type="reset" name="clear_reg" value="Очистить">
                                </div>
                            </form>
                        </article>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
